{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Select Pilot</h4>
            </div>
            <div class="card-body">
                <div class="list-group">
                    {% for name, data in pilots.items() %}
                        <a href="{{ url_for('select_pilot', name=name) }}" 
                           class="list-group-item list-group-item-action d-flex justify-content-between align-items-center {% if name == active_pilot %}active{% endif %}">
                            <div>
                                <h5 class="mb-1">{{ name }}</h5>
                                <small>Location: {{ data.current_location }} (Home: {{ data.home_location }})</small>
                            </div>
                            {% if name == active_pilot %}
                                <span class="badge bg-light text-primary rounded-pill">Active</span>
                            {% endif %}
                        </a>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
